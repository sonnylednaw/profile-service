spring:
  application:
    name: profile-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.mayson.tech

server:
  port: 8083

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG

assistant:
  base-url: ${AI_BASE_URL:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o-mini}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:25}
  cache-ttl-seconds: ${AI_CACHE_TTL_SECONDS:120}
  max-context-chars: ${AI_MAX_CONTEXT_CHARS:120000}

receipt-ai:
  base-url: ${RECEIPT_AI_BASE_URL:${AI_BASE_URL:}}
  api-key: ${RECEIPT_AI_API_KEY:${AI_API_KEY:}}
  model: ${RECEIPT_AI_MODEL:llava:7b}
  timeout-seconds: ${RECEIPT_AI_TIMEOUT_SECONDS:${AI_TIMEOUT_SECONDS:45}}
